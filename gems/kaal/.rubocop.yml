plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec_rails
  - rubocop-factory_bot
  - rubocop-sequel

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: true
  Exclude:
    - .vscode/**/*
    - vendor/**/* # ignore vendored gems
    - vendor/bundle/**/* # (explicitly, for Bundler’s path)
Metrics/MethodLength:
  Max: 60
Metrics/ModuleLength:
  Max: 300
Metrics/BlockLength:
  Max: 50
Metrics/ParameterLists:
  Max: 10
RSpec/MultipleExpectations:
  Max: 30
RSpec/ExampleLength:
  Max: 80
Layout/LineLength:
  Max: 160
Metrics/ClassLength:
  Max: 300
Metrics/AbcSize:
  Max: 30
RSpec/MultipleMemoizedHelpers:
  Max: 15
Metrics/CyclomaticComplexity:
  Max: 15
RSpec/NestedGroups:
  Max: 5
Metrics/PerceivedComplexity:
  Max: 15
