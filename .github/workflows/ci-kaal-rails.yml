name: gems/kaal-rails
permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  kaal_rails:
    name: gems/kaal-rails · ${{ matrix.name }}
    uses: ./.github/workflows/shared-ci.yml
    strategy:
      fail-fast: false
      matrix:
        gemfile:
          - rails_8_1.gemfile
          - rails_8_0.gemfile
          - rails_7_2.gemfile
          - rails_edge.gemfile
        ruby_version:
          - 3.2
          - 3.4
          - 4.0
        exclude:
          - ruby_version: 3.2
            gemfile: rails_edge.gemfile
        include:
          - ruby_version: 3.2
            gemfile: rails_7_2.gemfile
            name: Rails 7.2 · Ruby 3.2
          - ruby_version: 3.2
            gemfile: rails_8_0.gemfile
            name: Rails 8.0 · Ruby 3.2
          - ruby_version: 3.2
            gemfile: rails_8_1.gemfile
            name: Rails 8.1 · Ruby 3.2
          - ruby_version: 3.4
            gemfile: rails_7_2.gemfile
            name: Rails 7.2 · Ruby 3.4
          - ruby_version: 3.4
            gemfile: rails_8_0.gemfile
            name: Rails 8.0 · Ruby 3.4
          - ruby_version: 3.4
            gemfile: rails_8_1.gemfile
            name: Rails 8.1 · Ruby 3.4
          - ruby_version: 3.4
            gemfile: rails_edge.gemfile
            name: Rails Edge · Ruby 3.4
          - ruby_version: 4.0
            gemfile: rails_7_2.gemfile
            name: Rails 7.2 · Ruby 4.0
          - ruby_version: 4.0
            gemfile: rails_8_0.gemfile
            name: Rails 8.0 · Ruby 4.0
          - ruby_version: 4.0
            gemfile: rails_8_1.gemfile
            name: Rails 8.1 · Ruby 4.0
          - ruby_version: 4.0
            gemfile: rails_edge.gemfile
            name: Rails Edge · Ruby 4.0
    with:
      app_dir: gems/kaal-rails
      ruby_version: ${{ matrix.ruby_version }}
      gemfile: gems/kaal-rails/gemfiles/${{ matrix.gemfile }}
      upload_coverage: ${{ matrix.gemfile == 'rails_8_0.gemfile' && matrix.ruby_version == '3.4' }}
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
