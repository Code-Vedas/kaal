name: Release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.4.3

jobs:
  publish_kaal:
    name: Publish core/kaal
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/core/kaal
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@main
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/core/kaal
        run: |
          gem build kaal.gemspec
          gem push kaal-*.gem

  publish_kaal_sequel:
    name: Publish core/kaal-sequel
    runs-on: ubuntu-latest
    needs: [publish_kaal]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/core/kaal-sequel
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@main
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/core/kaal-sequel
        run: |
          gem build kaal-sequel.gemspec
          gem push kaal-sequel-*.gem

  publish_kaal_activerecord:
    name: Publish core/kaal-activerecord
    runs-on: ubuntu-latest
    needs: [publish_kaal_sequel]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/core/kaal-activerecord
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@main
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/core/kaal-activerecord
        run: |
          gem build kaal-activerecord.gemspec
          gem push kaal-activerecord-*.gem

  publish_kaal_rails:
    name: Publish gems/kaal-rails
    runs-on: ubuntu-latest
    needs: [publish_kaal_activerecord]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/gems/kaal-rails
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@main
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/gems/kaal-rails
        run: |
          gem build kaal-rails.gemspec
          gem push kaal-rails-*.gem
