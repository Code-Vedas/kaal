name: Release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.4.3

jobs:
  verify_release:
    name: Verify release
    permissions:
      contents: read
    uses: ./.github/workflows/shared-ci.yml
    with:
      upload_coverage: false

  publish_kaal:
    name: Publish gems/kaal
    runs-on: ubuntu-latest
    needs: [verify_release]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ github.workspace }}/gems/kaal
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa
      - name: Build and push gem
        working-directory: ${{ github.workspace }}/gems/kaal
        run: |
          gem build kaal.gemspec
          version="$(ruby -e "spec = Gem::Specification.load('kaal.gemspec') or abort('failed to load kaal.gemspec'); print spec.version")"
          gem_file="kaal-${version}.gem"

          if curl -fsSL "https://rubygems.org/api/v1/versions/kaal.json" | ruby -rjson -e 'versions = JSON.parse($stdin.read); exit(versions.any? { |entry| entry["number"] == ARGV[0] } ? 0 : 1)' "$version"; then
            echo "kaal ${version} is already published on RubyGems; skipping push."
            exit 0
          fi

          push_output="$(gem push "$gem_file" 2>&1)" && {
            printf '%s\n' "$push_output"
            exit 0
          }
          status=$?
          printf '%s\n' "$push_output"

          if printf '%s\n' "$push_output" | grep -Eq 'Repushing of gem versions is not allowed|already pushed this version|already exists'; then
            echo "kaal ${version} was published concurrently; treating as success."
            exit 0
          fi

          exit "$status"

  publish_kaal_rails:
