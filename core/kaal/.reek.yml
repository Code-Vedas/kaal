---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
  DataClump:
    enabled: false
  MissingSafeMethod:
    enabled: true
    exclude:
      - Kaal::Coordinator
  ManualDispatch:
    enabled: true
    exclude:
      - Kaal::Registry#validate_entry
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal#dispatch_log_registry
      - Kaal#dispatched?
      - Kaal#reset_registry!
      - Kaal::Backend::DispatchRegistryAccessor#fetch_registry
      - Kaal::Backend::RedisAdapter#initialize
      - Kaal::SchedulerFileLoader::JobApplier#dispatch_job
      - Kaal::SchedulerFileLoader::JobApplier#active_job_dispatch?
      - Kaal::SchedulerFileLoader::JobApplier#validate_dispatch_interface
  UtilityFunction:
    enabled: true
    exclude:
      - Kaal::Dispatch::DatabaseEngine#cleanup
      - Kaal::Dispatch::DatabaseEngine#find_by_key
      - Kaal::Dispatch::DatabaseEngine#find_by_node
      - Kaal::Dispatch::DatabaseEngine#find_by_status
      - Kaal::Dispatch::DatabaseEngine#find_dispatch
      - Kaal::Dispatch::DatabaseEngine#log_dispatch
      - Kaal::Dispatch::MemoryEngine#build_key
      - Kaal::Dispatch::RedisEngine#convert_timestamps
      - Kaal::Backend::DispatchLogging#parse_lock_key
      - Kaal::Backend::SQLiteAdapter#wrapped_contention_error?
      - Kaal::SchedulerHashTransform#stringify_keys
      - Kaal::SchedulerHashTransform#symbolize_keys_deep
      - Kaal::SchedulerFileLoader::JobApplier#active_job_dispatch?
  FeatureEnvy:
    enabled: true
    exclude:
      - Kaal::Configuration#handle_known_key
      - Kaal::Configuration#normalize_value
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal::OccurrenceFinder#call
      - Kaal::Backend::DispatchRegistryAccessor#fetch_registry
      - Kaal::Definition::DatabaseEngine#normalize_row
      - Kaal::SchedulerFileLoader::JobApplier#dispatch_job
      - Kaal::SchedulerFileLoader::JobApplier#validate_dispatch_interface
      - Kaal::SchedulerFileLoader::JobApplier#validate_keyword_keys
  DuplicateMethodCall:
    enabled: true
    exclude:
      - Kaal::CronHumanizer#ensure_i18n_loaded!
      - Kaal::SchedulerFileLoader::JobApplier#validate_dispatch_interface
  NilCheck:
    enabled: true
    exclude:
      - Kaal::Coordinator#stop!
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal#dispatch_log_registry
      - Kaal#dispatched?
      - Kaal::SchedulerFileLoader::JobApplier#validate_dispatch_interface

exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*
