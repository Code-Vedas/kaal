---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
  DataClump:
    enabled: false
  FeatureEnvy:
    enabled: true
    exclude:
      - Kaal::ActiveRecord::DefinitionRegistry#upsert_definition
      - Kaal::ActiveRecord::DispatchRegistry#log_dispatch
  NilCheck:
    enabled: true
    exclude:
      - Kaal::ActiveRecord::ConnectionSupport#configure!
      - Kaal::ActiveRecord::DefinitionRegistry#normalize
  UtilityFunction:
    enabled: true
    exclude:
      - Kaal::ActiveRecord::DefinitionRegistry#normalize
      - Kaal::ActiveRecord::DispatchRegistry#normalize
      - Kaal::ActiveRecord::MySQLAdapter#scalar
      - Kaal::ActiveRecord::PostgresAdapter#scalar
exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*
